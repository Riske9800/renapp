<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>REN APP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --cr:#FEF3E2;--crd:#F0DEC0;--wh:#FFFCF5;
  --br:#7C4A2D;--brl:#A0673A;
  --am:#D4894A;--aml:#F4C99E;
  --tx:#3D2B1A;--txm:#6B4E35;--txl:#9E7B5E;
  --sh:rgba(124,74,45,.11);--r:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--cr);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;}
body.has-site-bg{background-size:cover;background-position:center;background-attachment:fixed;}
body.has-site-bg::before{content:'';position:fixed;inset:0;background:rgba(254,243,226,.82);pointer-events:none;z-index:0;}
body>*{position:relative;z-index:1;}

/* HEADER */
.hdr{background:var(--wh);border-bottom:1.5px solid var(--crd);padding:0 14px;height:54px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 14px var(--sh);overflow:hidden;}
.hdr.has-hbg{background-size:cover;background-position:center;}
.hdr.has-hbg::before{content:'';position:absolute;inset:0;background:rgba(255,248,240,.88);}
.hdr>*{position:relative;z-index:1;}
.logo{display:flex;align-items:center;gap:8px;font-family:'Playfair Display',serif;font-size:18px;color:var(--br);letter-spacing:.06em;}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--aml);display:block;}
.logo-paw{font-size:22px;display:inline-block;animation:pw 4s ease-in-out infinite;}
@keyframes pw{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg) scale(1.05)}}
.hdr-right{display:flex;gap:2px;}
.ico-btn{background:none;border:none;cursor:pointer;padding:7px;border-radius:50%;font-size:19px;color:var(--br);transition:all .2s;display:flex;align-items:center;}
.ico-btn:hover{background:var(--cr);transform:scale(1.12);}

/* TAB CONTENTS */
.tab-content{display:none;padding:16px 14px 120px;max-width:560px;margin:0 auto;}
.tab-content.active{display:block;}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--wh);border-top:1.5px solid var(--crd);display:flex;box-shadow:0 -2px 14px var(--sh);}
.nav-btn{flex:1;padding:10px 0 12px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txl);font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;transition:all .2s;}
.nav-btn .ni{font-size:22px;transition:transform .2s;}
.nav-btn.on{color:var(--br);}
.nav-btn.on .ni{transform:scale(1.15);}

/* FAB */
.fab{position:fixed;bottom:76px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,var(--am),var(--br));border:none;cursor:pointer;z-index:99;display:flex;align-items:center;justify-content:center;font-size:28px;color:white;box-shadow:0 5px 22px rgba(124,74,45,.4);transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.fab:hover{transform:scale(1.1);}
.fab:active{transform:scale(.93);}
.fab[hidden]{display:none;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--txl);}
.empty-icon{font-size:66px;display:block;margin-bottom:14px;animation:fy 3s ease-in-out infinite;}
@keyframes fy{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.empty h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--br);margin-bottom:6px;}
.empty p{font-size:13px;line-height:1.7;}
.spinner{text-align:center;padding:50px 20px;color:var(--txl);font-size:13px;}
.spin{font-size:36px;display:block;margin-bottom:10px;animation:sp 1.1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* FEED CARD */
.card{background:var(--wh);border-radius:var(--r);margin-bottom:18px;box-shadow:0 4px 20px var(--sh);overflow:hidden;animation:ci .35s cubic-bezier(.22,1,.36,1);}
@keyframes ci{from{opacity:0;transform:translateY(14px)}}
.card-head{padding:11px 14px;display:flex;align-items:center;gap:10px;}
.avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--aml),var(--br));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:white;text-transform:uppercase;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.ainfo{flex:1;min-width:0;}
.aname{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.adate{font-size:11px;color:var(--txl);margin-top:1px;}
.gtag{flex-shrink:0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--crd);color:var(--br);white-space:nowrap;}
/* card menu */
.card-menu-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 6px;color:var(--txl);border-radius:8px;transition:all .15s;flex-shrink:0;}
.card-menu-btn:hover{background:var(--cr);color:var(--br);}
.card-menu-pop{position:absolute;right:10px;top:44px;background:var(--wh);border-radius:12px;box-shadow:0 6px 22px rgba(0,0,0,.16);z-index:50;overflow:hidden;min-width:120px;display:none;}
.card-menu-pop.open{display:block;animation:ci .15s ease;}
.cmp-item{display:block;width:100%;padding:12px 16px;background:none;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:background .15s;}
.cmp-item:hover{background:var(--cr);}
.cmp-item.danger{color:#c0392b;}
.cmp-item.danger:hover{background:#fce8e8;}
.card-wrap{position:relative;}
/* carousel */
.car{position:relative;background:var(--crd);overflow:hidden;}
.ctrack{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);}
.ctrack img{min-width:100%;aspect-ratio:1;object-fit:cover;}
.cbtn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.88);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--br);box-shadow:0 2px 8px rgba(0,0,0,.16);transition:all .2s;z-index:2;}
.cbtn.prev{left:8px;} .cbtn.next{right:8px;} .cbtn[hidden]{display:none;}
.cdots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);transition:all .2s;}
.dot.on{background:white;transform:scale(1.4);}
.nophoto{background:linear-gradient(135deg,var(--aml),var(--crd));height:160px;display:flex;align-items:center;justify-content:center;font-size:56px;}
.card-body{padding:12px 14px 16px;}
.ctitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;margin-bottom:6px;line-height:1.4;}
.ccomment{font-size:13px;color:var(--txm);line-height:1.75;white-space:pre-wrap;word-break:break-word;}
/* dog photo upload zone */
.dog-photo-zone{width:80px;height:80px;border-radius:16px;border:2px dashed var(--am);background:var(--cr);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;overflow:hidden;position:relative;}
.dog-photo-zone:hover{background:var(--aml);}
.dog-photo-zone img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.dog-photo-zone .dpz-icon{font-size:22px;}
.dog-photo-zone .dpz-txt{font-size:9px;color:var(--txl);margin-top:2px;}
.dog-photo-zone input{display:none;}
/* act delete btn */
.act-del{background:none;border:none;cursor:pointer;font-size:16px;color:var(--txl);padding:4px;border-radius:8px;flex-shrink:0;transition:all .15s;}
.act-del:hover{color:#c0392b;background:#fce8e8;}

/* EMBEDDED FEED FILTER */
.feed-filter-bar{position:sticky;top:54px;z-index:50;background:var(--cr);padding:10px 0 8px;margin:-16px -14px 14px;padding:10px 14px 8px;border-bottom:1px solid var(--crd);display:flex;flex-direction:column;gap:7px;}
.filter-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.filter-scroll::-webkit-scrollbar{display:none;}
.fchip{flex-shrink:0;padding:5px 13px;border-radius:20px;border:2px solid var(--crd);background:var(--wh);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--txl);cursor:pointer;transition:all .2s;white-space:nowrap;}
.fchip.on{background:var(--br);border-color:var(--br);color:white;}
.author-sel{width:100%;padding:8px 12px;border:2px solid var(--crd);border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--tx);background:var(--cr);-webkit-appearance:none;}

/* SETTINGS SUB-TABS */
.stab-bar{display:flex;gap:6px;margin-bottom:18px;background:var(--cr);border-radius:12px;padding:4px;}
.stab{flex:1;padding:9px;background:none;border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--txl);cursor:pointer;transition:all .2s;}
.stab.on{background:var(--wh);color:var(--br);box-shadow:0 2px 8px var(--sh);}

/* FILTER TAB (legacy - kept for renderFilter fallback) */
.filter-sel{width:100%;padding:10px 12px;border:2px solid var(--crd);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--tx);background:var(--cr);-webkit-appearance:none;margin-bottom:14px;}

/* DOG TAB */
.dog-card{background:var(--wh);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:0 3px 16px var(--sh);display:flex;gap:14px;align-items:flex-start;}
.dog-avatar{width:70px;height:70px;border-radius:16px;object-fit:cover;background:var(--crd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;border:2px solid var(--aml);overflow:hidden;}
.dog-avatar img{width:100%;height:100%;object-fit:cover;}
.dog-info{flex:1;min-width:0;}
.dog-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--br);}
.dog-breed{font-size:12px;color:var(--txl);margin-top:2px;}
.dog-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.dtag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--cr);color:var(--txm);font-weight:600;}
.dog-edit-btn{background:none;border:1.5px solid var(--am);color:var(--am);border-radius:10px;padding:5px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;}

.sec-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--br);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.act-quick{display:flex;gap:10px;margin-bottom:18px;}
.aq-btn{flex:1;padding:12px 6px;background:var(--wh);border:2px solid var(--crd);border-radius:14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--txm);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;box-shadow:0 2px 8px var(--sh);}
.aq-btn:hover{border-color:var(--am);color:var(--br);background:var(--aml);}
.aq-btn .ai{font-size:26px;}
.act-list{display:flex;flex-direction:column;gap:10px;}
.act-row{background:var(--wh);border-radius:14px;padding:12px 14px;display:flex;gap:12px;align-items:center;box-shadow:0 2px 8px var(--sh);}
.act-icon{font-size:28px;flex-shrink:0;}
.act-info{flex:1;min-width:0;}
.act-type{font-weight:700;font-size:14px;color:var(--tx);}
.act-meta{font-size:11px;color:var(--txl);margin-top:2px;}
.act-detail{font-size:12px;color:var(--txm);margin-top:3px;}

/* ANALYSIS TAB */
.analysis-top{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
.dog-pick{flex:1;padding:10px 12px;border:2px solid var(--crd);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--tx);background:var(--cr);-webkit-appearance:none;}
.btn-analyze{padding:11px 20px;background:linear-gradient(135deg,var(--am),var(--br));color:white;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.btn-analyze:hover:not(:disabled){opacity:.9;}
.btn-analyze:disabled{opacity:.6;cursor:not-allowed;}

.score-banner{background:linear-gradient(135deg,var(--br),var(--am));border-radius:18px;padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;color:white;}
.score-num{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;line-height:1;}
.score-label{font-size:13px;opacity:.85;margin-top:4px;}
.score-info{flex:1;}
.score-title{font-family:'Playfair Display',serif;font-size:17px;}
.score-date{font-size:11px;opacity:.75;margin-top:3px;}

.analysis-card{background:var(--wh);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:0 3px 14px var(--sh);}
.analysis-card h3{font-family:'Playfair Display',serif;font-size:15px;color:var(--br);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.insight-item,.rec-item{padding:7px 10px;border-radius:10px;font-size:13px;line-height:1.6;margin-bottom:6px;}
.insight-item{background:var(--cr);color:var(--txm);}
.rec-item{background:linear-gradient(135deg,rgba(212,137,74,.1),rgba(124,74,45,.08));color:var(--txm);}

.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.chart-box{background:var(--wh);border-radius:14px;padding:12px;box-shadow:0 2px 10px var(--sh);}
.chart-box h4{font-size:11px;font-weight:700;color:var(--txl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}

.hist-row{background:var(--wh);border-radius:14px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer;box-shadow:0 2px 8px var(--sh);transition:all .2s;}
.hist-row:hover{box-shadow:0 4px 14px var(--sh);}
.hist-title{font-weight:700;font-size:14px;color:var(--tx);}
.hist-date{font-size:11px;color:var(--txl);margin-top:2px;}
.hist-score{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--br);}

/* SETUP GUIDE */
.setup-guide{background:var(--wh);border-radius:var(--r);padding:20px;margin-bottom:18px;box-shadow:0 4px 18px var(--sh);border-left:4px solid var(--am);}
.setup-guide h2{font-family:'Playfair Display',serif;font-size:17px;color:var(--br);margin-bottom:14px;}
.step{display:flex;gap:10px;margin-bottom:12px;}
.snum{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--am),var(--br));color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.sbody .stitle{font-weight:700;font-size:13px;color:var(--tx);margin-bottom:2px;}
.sbody .sdesc{font-size:12px;color:var(--txl);line-height:1.7;}
.scode{display:inline-block;margin-top:3px;background:var(--crd);color:var(--br);font-size:11px;font-family:monospace;padding:2px 7px;border-radius:5px;word-break:break-all;}
.btn-setup{width:100%;margin-top:14px;padding:12px;background:linear-gradient(135deg,var(--am),var(--br));color:white;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* OVERLAY / MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(40,22,10,.6);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px);}
.ov.open{display:flex;animation:fo .2s;}
@keyframes fo{from{opacity:0}}
.modal{background:var(--wh);border-radius:28px 28px 0 0;width:100%;max-width:560px;max-height:94vh;overflow-y:auto;overscroll-behavior:contain;animation:su .3s cubic-bezier(.32,1.25,.6,1);}
@keyframes su{from{transform:translateY(100%)}}
.mgrip{width:40px;height:4px;background:var(--crd);border-radius:2px;margin:11px auto 0;}
.mhead{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--crd);}
.mttl{font-family:'Playfair Display',serif;font-size:18px;color:var(--br);}
.xbtn{background:var(--cr);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--txl);transition:all .2s;}
.xbtn:hover{background:var(--crd);}
.mbody{padding:18px 14px 28px;}

/* FORMS */
.fg{margin-bottom:15px;}
label{display:block;font-size:11px;font-weight:700;color:var(--brl);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
input,select,textarea{width:100%;padding:11px 13px;border:2px solid var(--crd);border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--tx);background:var(--cr);outline:none;transition:border-color .2s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--am);background:var(--wh);}
textarea{resize:none;height:90px;line-height:1.7;}
.upload-zone{border:2px dashed var(--am);border-radius:12px;padding:18px;text-align:center;cursor:pointer;background:var(--cr);transition:all .2s;}
.upload-zone:hover{background:var(--aml);}
.uz-icon{font-size:28px;margin-bottom:4px;}
.uz-txt{font-size:12px;color:var(--txl);}
.upload-zone input{display:none;}
.prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px;}
.pi{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;}
.pi img{width:100%;height:100%;object-fit:cover;}
.pdel{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.btn-main{width:100%;padding:14px;margin-top:8px;background:linear-gradient(135deg,var(--am),var(--br));color:white;border:none;border-radius:13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-main:hover:not(:disabled){opacity:.9;transform:translateY(-1px);}
.btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-sec{width:100%;padding:11px;margin-top:8px;background:var(--cr);color:var(--br);border:2px solid var(--am);border-radius:13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.errmsg{font-size:12px;color:#c0392b;margin-top:6px;min-height:16px;}
.sdivider{height:1px;background:var(--crd);margin:18px 0;}

/* GENRE EDITOR in settings */
.genre-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--crd);}
.genre-row:last-child{border-bottom:none;}
.g-icon-pick{width:44px;padding:8px;text-align:center;font-size:18px;}
.g-label-in{flex:1;}
.g-del{background:#fce8e8;color:#c0392b;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;}
.g-add-row{display:flex;gap:8px;margin-top:10px;}
.g-add-row input{flex:1;}
.g-add-btn{padding:9px 14px;background:var(--aml);color:var(--br);border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

/* ASSET MANAGER in settings */
.asset-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--crd);}
.asset-row:last-child{border-bottom:none;}
.asset-prev{width:48px;height:48px;border-radius:10px;object-fit:cover;background:var(--crd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.asset-prev img{width:100%;height:100%;object-fit:cover;}
.ai-info{flex:1;min-width:0;}
.ai-label{font-weight:700;font-size:13px;}
.ai-sub{font-size:11px;color:var(--txl);}
.aact{display:flex;gap:5px;}
.a-up{background:var(--aml);color:var(--br);border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;}
.a-del{background:#fce8e8;color:#c0392b;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;}

/* TOAST */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--tx);color:var(--wh);padding:10px 20px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;opacity:0;pointer-events:none;white-space:nowrap;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* FULL LOADING */
#loading-ov{display:none;position:fixed;inset:0;background:rgba(40,22,10,.55);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:white;font-size:15px;font-weight:600;}
#loading-ov.show{display:flex;}
#loading-ov .ls{font-size:40px;animation:sp 1s linear infinite;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr" id="main-header">
  <div class="logo">
    <span class="logo-paw" id="logo-default">🐾</span>
    <span style="font-size:17px;font-weight:700;letter-spacing:.06em;">REN APP</span>
  </div>
  <div class="hdr-right">
    <button class="ico-btn" onclick="loadData()" title="更新">🔄</button>
    <button class="ico-btn" onclick="openSettings()" title="設定">⚙️</button>
  </div>
</header>

<!-- TAB: 投稿（絞り込み統合） -->
<div id="tab-feed" class="tab-content active">
  <!-- filter bar embedded -->
  <div class="feed-filter-bar" id="feed-filter-bar">
    <div class="filter-scroll" id="genre-chips"></div>
    <select class="author-sel" id="author-filter" onchange="renderFeedFiltered()">
      <option value="">全員</option>
    </select>
  </div>
  <div id="feed-posts">
    <div class="spinner"><span class="spin">🐾</span>読み込み中…</div>
  </div>
</div>

<!-- TAB: わんこ -->
<div id="tab-dog" class="tab-content">
  <div id="dog-content"></div>
</div>

<!-- TAB: 分析 -->
<div id="tab-analysis" class="tab-content">
  <div class="analysis-top">
    <select class="dog-pick" id="analysis-dog-pick" onchange="onAnalysisDogChange()">
      <option value="">わんこを選択</option>
    </select>
    <button class="btn-analyze" id="btn-analyze" onclick="runAnalysis()">✨ 分析</button>
  </div>
  <div id="analysis-result"></div>
  <div id="analysis-history"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <button class="nav-btn on" id="nav-feed" onclick="switchTab('feed')">
    <span class="ni">📋</span><span>投稿</span>
  </button>
  <button class="nav-btn" id="nav-dog" onclick="switchTab('dog')">
    <span class="ni">🐕</span><span>わんこ</span>
  </button>
  <button class="nav-btn" id="nav-analysis" onclick="switchTab('analysis')">
    <span class="ni">📊</span><span>分析</span>
  </button>
</nav>

<!-- FAB -->
<button class="fab" id="fab" onclick="onFab()">＋</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOADING -->

<!-- ============================================================
     MODALS
     ============================================================ -->

<!-- POST MODAL (新規 & 編集 共用) -->
<div class="ov" id="ov-post">
  <div class="modal">
    <div class="mgrip"></div>
    <div class="mhead"><span class="mttl" id="post-modal-ttl">🐶 思い出を投稿</span><button class="xbtn" onclick="closeOv('ov-post')">✕</button></div>
    <div class="mbody">
      <input type="hidden" id="f-id">
      <div class="fg">
        <label>📷 写真（最大9枚）</label>
        <div class="upload-zone" onclick="document.getElementById('f-photos').click()">
          <div class="uz-icon">📸</div><div class="uz-txt">タップして選択・複数OK</div>
          <input type="file" id="f-photos" accept="image/*" multiple onchange="onPostPhoto(event)">
        </div>
        <div class="prev-grid" id="post-prev"></div>
      </div>
      <div class="fg"><label>✏️ タイトル *</label><input type="text" id="f-title" maxlength="60" placeholder="例：公園でお散歩♪"></div>
      <div class="fg"><label>📅 日付</label><input type="date" id="f-date"></div>
      <div class="fg"><label>🏷️ ジャンル</label><select id="f-genre"></select></div>
      <div class="fg"><label>💬 コメント</label><textarea id="f-comment" placeholder="今日の思い出を…"></textarea></div>
      <div class="fg"><label>👤 投稿者</label><input type="text" id="f-author" placeholder="例：れん ママ"></div>
      <div class="errmsg" id="post-err"></div>
      <button class="btn-main" id="post-btn" onclick="submitPost()">投稿する</button>
    </div>

</div>

<!-- DOG MODAL -->
<div class="ov" id="ov-dog">
  <div class="modal">
    <div class="mgrip"></div>
    <div class="mhead"><span class="mttl" id="dog-modal-ttl">🐕 わんこを登録</span><button class="xbtn" onclick="closeOv('ov-dog')">✕</button></div>
    <div class="mbody">
      <input type="hidden" id="d-id">
      <!-- 写真 -->
      <div class="fg" style="display:flex;align-items:center;gap:14px;">
        <div class="dog-photo-zone" id="d-photo-zone" onclick="document.getElementById('d-photo-input').click()">
          <span class="dpz-icon">📷</span><span class="dpz-txt">写真</span>
          <input type="file" id="d-photo-input" accept="image/*" onchange="onDogPhoto(event)">
        </div>
        <div style="flex:1">
          <div style="font-size:12px;color:var(--txl);line-height:1.7;">写真をタップして設定<br>アイコンとして表示されます</div>
          <button id="d-photo-del" onclick="clearDogPhoto()" style="display:none;margin-top:6px;background:#fce8e8;color:#c0392b;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;">写真を削除</button>
        </div>
      </div>
      <div class="fg"><label>🐾 名前 *</label><input type="text" id="d-name" placeholder="例：れん"></div>
      <div class="fg"><label>🦴 犬種</label><input type="text" id="d-breed" placeholder="例：トイプードル"></div>
      <div class="fg"><label>🎂 誕生日</label><input type="date" id="d-birthday"></div>
      <div class="fg"><label>⚖️ 体重 (kg)</label><input type="number" id="d-weight" step="0.1" placeholder="例：3.2"></div>
      <div class="fg"><label>💊 体質・アレルギー等</label><textarea id="d-constitution" placeholder="例：皮膚が弱め、鶏肉アレルギーあり" style="height:70px"></textarea></div>
      <div class="fg"><label>❤️ 好物</label><input type="text" id="d-favorites" placeholder="例：チーズ、ゆで鶏ささみ"></div>
      <div class="fg"><label>📝 メモ</label><textarea id="d-notes" placeholder="その他メモ…" style="height:70px"></textarea></div>
      <div class="errmsg" id="dog-err"></div>
      <button class="btn-main" id="dog-btn" onclick="submitDog()">保存する</button>
    </div>

</div>

<!-- ACTIVITY MODAL -->
<div class="ov" id="ov-act">
  <div class="modal">
    <div class="mgrip"></div>
    <div class="mhead"><span class="mttl" id="act-modal-ttl">🦮 散歩を記録</span><button class="xbtn" onclick="closeOv('ov-act')">✕</button></div>
    <div class="mbody">

      <div class="fg"><label>🐕 わんこ</label><select id="a-dog"></select></div>

      <div class="fg"><label>🕐 開始時刻</label><input type="time" id="a-time"></div>
      <div class="fg"><label>⏱️ 時間（分）</label><input type="number" id="a-dur" placeholder="例：30" min="1"></div>
      <div class="fg" id="a-location-fg"><label>📍 場所</label><input type="text" id="a-loc" placeholder="例：近所の公園"></div>
      <div class="fg" id="a-detail-fg"><label id="a-detail-lbl">📝 詳細</label><input type="text" id="a-detail" placeholder=""></div>
      <div class="fg"><label>🗒️ メモ</label><textarea id="a-notes" placeholder="その他メモ…" style="height:70px"></textarea></div>

<!-- SETTINGS MODAL -->
<div class="ov" id="ov-settings">
  <div class="modal">
    <div class="mgrip"></div>
    <div class="mhead"><span class="mttl">⚙️ REN APP 設定</span><button class="xbtn" onclick="closeOv('ov-settings')">✕</button></div>
    <div class="mbody">

      <!-- SETTINGS SUB-TABS -->
      <div class="stab-bar">

        <!-- ASSET MANAGER -->

        </div>
      </div>

      <!-- CORE SETTINGS -->
      <div id="stab-core-body" style="display:none">
        <div style="background:linear-gradient(135deg,rgba(212,137,74,.1),rgba(124,74,45,.08));border-radius:12px;padding:14px;margin-bottom:16px;font-size:12px;color:var(--txm);line-height:1.7;">
          🔑 コア設定はアプリの動作に必要なAPIキー等を管理します。<br>変更すると即座に反映されます。
        </div>
        <div class="fg">
          <label>🔗 GAS ウェブアプリ URL</label>
          <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/…/exec">
          <p style="font-size:11px;color:var(--txl);margin-top:4px;line-height:1.7;">デプロイ設定 → 種類：ウェブアプリ / アクセス：全員</p>
        </div>

          <label>🤖 Claude API Key</label>
          <input type="password" id="cfg-claude" placeholder="sk-ant-… （変更時のみ入力）">
          <p style="font-size:11px;color:var(--txl);margin-top:4px;line-height:1.7;">AI分析機能に必要。GASに保存されます。<br>空欄のままにすると現在のキーが維持されます。</p>
        </div>
        <button class="btn-main" onclick="saveCoreSettings()">コア設定を保存 ✓</button>

    </div>
  </div>
</div>

<!-- ANALYSIS DETAIL MODAL -->
<div class="ov" id="ov-analysis">
  <div class="modal">
    <div class="mgrip"></div>
    <div class="mhead"><span class="mttl" id="analysis-detail-ttl">📊 分析結果</span><button class="xbtn" onclick="closeOv('ov-analysis')">✕</button></div>
    <div class="mbody" id="analysis-detail-body"></div>
  </div>
</div>

<script>
// ============================================================
//  STATE
// ============================================================
const CFG_KEY = 'renapp_cfg_v3';
let cfg = {};
try { cfg = JSON.parse(localStorage.getItem(CFG_KEY) || '{}'); } catch(e) {}
function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }

let appData = { posts:[], assets:{}, genres:[], dogs:[], activities:[], analysisHistory:[] };
let selectedFiles = [];
let pendingAssetKey = null;
let currentTab = 'feed';
let filterGenre = 'all';
let analysisCharts = {};

// ============================================================
//  INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = today();
  document.getElementById('a-date').value = today();
  // overlay bg click to close
  document.querySelectorAll('.ov').forEach(ov => {
    ov.addEventListener('click', e => { if (e.target === ov) closeOv(ov.id); });
  });
  if (cfg.url) loadData();
  else renderSetupGuide();
});

function today() { return new Date().toISOString().split('T')[0]; }

// ============================================================
//  DATA LOADING
// ============================================================
async function loadData() {
  if (!cfg.url) { renderSetupGuide(); return; }
  document.getElementById('feed-posts').innerHTML = '<div class="spinner"><span class="spin">🐾</span>読み込み中…</div>';
  try {
    const r = await fetch(cfg.url + '?t=' + Date.now());
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    appData = { posts: d.posts||[], assets: d.assets||{}, genres: d.genres||[], dogs: d.dogs||[], activities: d.activities||[], analysisHistory: d.analysisHistory||[] };
    applyAssets();
    renderGenreChips();
    renderAuthorFilter();
    renderFeedFiltered();
    renderDogTab();
    renderAnalysisTab();
    renderGenreEditor();
    renderPlayEditor();
    renderAssetEditor();
    populateGenreSelect();
    populateDogSelects();
  } catch(e) {
    document.getElementById('feed-posts').innerHTML = `<div class="empty"><span class="empty-icon">😅</span><h2>読み込み失敗</h2><p>GAS URLを確認してください<br><small>${e.message}</small></p></div>`;
  }
}

// ============================================================
//  ASSETS APPLY
// ============================================================
function applyAssets() {
  const a = appData.assets;
  // logo
  if (a.logo?.url) {
    let img = document.getElementById('logo-img');
    if (!img) { img = document.createElement('img'); img.id='logo-img'; img.className='logo-img'; img.alt='logo'; }
    img.src = a.logo.thumb || a.logo.url;
    document.getElementById('logo-default').replaceWith(img);
  }
  // site bg
  if (a.site_bg?.url) { document.body.style.backgroundImage=`url("${a.site_bg.url}")`; document.body.classList.add('has-site-bg'); }
  else { document.body.style.backgroundImage=''; document.body.classList.remove('has-site-bg'); }
  // header bg
  const hdr = document.getElementById('main-header');
  if (a.header_bg?.url) { hdr.style.backgroundImage=`url("${a.header_bg.url}")`; hdr.classList.add('has-hbg'); }
  else { hdr.style.backgroundImage=''; hdr.classList.remove('has-hbg'); }
}

// ============================================================
//  TAB SWITCHING
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('on');
  document.getElementById('fab').hidden = (tab === 'analysis');
}

function onFab() {
  if (currentTab === 'dog') { openActivityPicker(); }
  else { openPost(); }
}

// ============================================================
//  TAB 1: FEED + FILTER
// ============================================================
const GICON = {};
function buildGIconMap() { appData.genres.forEach(g => GICON[g.label] = g.icon); }

function renderSetupGuide() {
  document.getElementById('feed-posts').innerHTML = `
  <div class="setup-guide">
    <h2>🐾 REN APP セットアップ</h2>
    <div class="step"><div class="snum">1</div><div class="sbody"><div class="stitle">スプレッドシートを作成</div><div class="sdesc">Google Drive で新規スプレッドシートを作成</div></div></div>
    <div class="step"><div class="snum">2</div><div class="sbody"><div class="stitle">Apps Script を開く</div><div class="sdesc"><span class="scode">拡張機能 → Apps Script</span></div></div></div>
    <div class="step"><div class="snum">3</div><div class="sbody"><div class="stitle">gas_code.gs を貼り付けて保存</div><div class="sdesc">エディタに全文貼り付けて 💾 保存</div></div></div>
    <div class="step"><div class="snum">4</div><div class="sbody"><div class="stitle">ウェブアプリとしてデプロイ</div><div class="sdesc"><span class="scode">デプロイ → 新しいデプロイ</span><br>種類：ウェブアプリ　アクセス：全員 → URLをコピー</div></div></div>
    <div class="step"><div class="snum">5</div><div class="sbody"><div class="stitle">設定に URL を貼り付ける</div><div class="sdesc">⚙️ → コア設定 から登録</div></div></div>
    <button class="btn-setup" onclick="openSettings()">⚙️ 設定を開く</button>
  </div>`;
}

function renderGenreChips() {
  buildGIconMap();
  const bar = document.getElementById('genre-chips');
  bar.innerHTML = `<button class="fchip on" onclick="setGenreFilter('all',this)">すべて</button>` +
    appData.genres.map(g => `<button class="fchip" onclick="setGenreFilter('${esc(g.label)}',this)">${g.icon} ${esc(g.label)}</button>`).join('');
}

function setGenreFilter(val, btn) {
  filterGenre = val;
  document.querySelectorAll('#genre-chips .fchip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderFeedFiltered();
}

function renderAuthorFilter() {
  const sel = document.getElementById('author-filter');
  const authors = [...new Set(appData.posts.map(p => p.author).filter(Boolean))];
  const cur = sel.value;
  sel.innerHTML = `<option value="">全員</option>` + authors.map(a => `<option ${a===cur?'selected':''}>${esc(a)}</option>`).join('');
}

function renderFeedFiltered() {
  buildGIconMap();
  const author = document.getElementById('author-filter')?.value || '';
  let posts = appData.posts;
  if (filterGenre !== 'all') posts = posts.filter(p => p.genre === filterGenre);
  if (author) posts = posts.filter(p => p.author === author);
  const el = document.getElementById('feed-posts');
  if (!posts.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">🐶</span><h2>${appData.posts.length ? '該当なし' : 'まだ投稿がありません'}</h2><p>${appData.posts.length ? '条件を変えてみてください' : '＋ボタンから最初の思い出を！'}</p></div>`;
    return;
  }
  el.innerHTML = posts.map((p,i) => buildCard(p,i,'f')).join('');
}

// keep renderFeed as alias
function renderFeed() { renderFeedFiltered(); }
function buildCard(p, i, prefix) {
  const photos = Array.isArray(p.photos) ? p.photos : [];
  const icon = GICON[p.genre] || '🌟';
  const initial = p.author ? p.author[0].toUpperCase() : '?';
  const cid = prefix + 'c' + i;
  const petAsset = appData.assets?.default_pet;
  const avatarHtml = petAsset?.url
    ? `<div class="avatar"><img src="${petAsset.thumb||petAsset.url}" alt="pet"></div>`
    : `<div class="avatar">${initial}</div>`;
  let photoHtml = '';
  if (!photos.length) {
    photoHtml = `<div class="nophoto">🐾</div>`;
  } else {
    const slides = photos.map(ph => `<img src="${ph.thumb||ph.url||ph}" loading="lazy" alt="思い出" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23F0DEC0%22 width=%22100%25%22 height=%22100%25%22/%3E%3C/svg%3E'">`).join('');
    const multi = photos.length > 1;
    const dots = multi ? photos.map((_,j)=>`<div class="dot ${j===0?'on':''}"></div>`).join('') : '';
    photoHtml = `<div class="car" id="${cid}"><div class="ctrack">${slides}</div>${multi?`<button class="cbtn prev" hidden onclick="mc('${cid}',-1)">‹</button><button class="cbtn next" onclick="mc('${cid}',1)">›</button><div class="cdots">${dots}</div>`:''}</div>`;
  }
  const menuId = 'menu-' + cid;
  return `<div class="card-wrap">
  <div class="card">
    <div class="card-head">
      ${avatarHtml}
      <div class="ainfo"><div class="aname">${esc(p.author||'匿名')}</div><div class="adate">${fmtDate(p.date)}</div></div>
      <div class="gtag">${icon} ${esc(p.genre||'その他')}</div>
      <button class="card-menu-btn" onclick="toggleCardMenu('${menuId}',event)">•••</button>
    </div>
    ${photoHtml}
    <div class="card-body">${p.title?`<div class="ctitle">${esc(p.title)}</div>`:''}${p.comment?`<div class="ccomment">${esc(p.comment)}</div>`:''}</div>
  </div>
  <div class="card-menu-pop" id="${menuId}">
    <button class="cmp-item" onclick="openEditPost('${p.id}');closeAllMenus()">✏️ 編集</button>
    <button class="cmp-item danger" onclick="confirmDeletePost('${p.id}');closeAllMenus()">🗑️ 削除</button>
  </div>
</div>`;
}

// carousel
const carState = {};
function mc(id, dir) {
  const el = document.getElementById(id); if (!el) return;
  const imgs = el.querySelectorAll('.ctrack img'), n = imgs.length;
  if (!carState[id]) carState[id] = 0;
  carState[id] = Math.max(0, Math.min(n-1, carState[id]+dir));
  const cur = carState[id];
  el.querySelector('.ctrack').style.transform = `translateX(-${cur*100}%)`;
  el.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===cur));
  const pb=el.querySelector('.prev'); if(pb) pb.hidden=cur===0;
  const nb=el.querySelector('.next'); if(nb) nb.hidden=cur===n-1;
}

// ============================================================
//  TAB 2: DOG
// ============================================================
const ACT_CONF = {
  walk:  { icon:'🦮', label:'散歩',   detailLabel:'コース・内容', detailHint:'例：川沿いコース', showLoc:true,  useDropdown:false },
  meal:  { icon:'🍖', label:'ごはん', detailLabel:'食べたもの',   detailHint:'例：ドライフード100g＋チキン', showLoc:false, useDropdown:false },

    </div>

  </div>`;

function calcAge(birthday) {
  if (!birthday) return null;
  const b = new Date(birthday), now = new Date();
  let age = now.getFullYear() - b.getFullYear();
  if (now.getMonth() < b.getMonth() || (now.getMonth()===b.getMonth() && now.getDate()<b.getDate())) age--;
  return age;
}

async function runAnalysis() {
  const dogId = document.getElementById('analysis-dog-pick').value;
  if (!dogId) { toast('わんこを選択してください'); return; }
  if (!cfg.url) { toast('GAS URLが未設定です'); return; }
  const dog = appData.dogs.find(d => d.id === dogId);
  if (!dog) return;
  setLoading(true, 'AI分析中…');
  try {
    const acts = appData.activities.filter(a => a.dogId === dogId);
    const walks = acts.filter(a => a.type==='walk');
    const meals = acts.filter(a => a.type==='meal');
    const plays = acts.filter(a => a.type==='play');
    const age = dog.birthday ? calcAge(dog.birthday) : '不明';
    const prompt = buildAnalysisPrompt(dog, age, walks, meals, plays);
    const r = await gasPost({ action:'runAnalysis', prompt });
    if (!r.success) throw new Error(r.error);
    let parsed;
    try {
      const clean = r.text.replace(/```json|```/g,'').trim();
      parsed = JSON.parse(clean);
    } catch(e) { throw new Error('分析結果のパースに失敗しました: ' + e.message); }
    // 固定タイトル: 犬名 + 月 + 分析レポート
    const now = new Date();
    const fixedTitle = `${dog.name} ${now.getMonth()+1}月 分析レポート`;
    parsed.title = fixedTitle;
    // save to sheets
    await gasPost({ action:'storeAnalysis', dogId, date: today(), title: fixedTitle, resultText: parsed.summary||'', chartsData: parsed });
    appData.analysisHistory.unshift({ id: Date.now().toString(), dogId, date: today(), title: fixedTitle, resultText: parsed.summary||'', chartsJson: JSON.stringify(parsed) });
    displayAnalysisResult(parsed);
    renderAnalysisHistory();
    toast('分析完了！');
  } catch(e) {
    toast('エラー: ' + e.message);
  } finally { setLoading(false); }
}

function buildAnalysisPrompt(dog, age, walks, meals, plays) {
  const walkSummary = walks.slice(0,30).map(w => `- ${w.date} ${w.startTime||''} ${w.duration||'?'}分 ${w.location||''} ${w.detail||''}`).join('\n') || 'データなし';
  const mealSummary = meals.slice(0,30).map(m => `- ${m.date} ${m.startTime||''} ${m.detail||''} ${m.notes||''}`).join('\n') || 'データなし';
  const playSummary = plays.slice(0,20).map(p => `- ${p.date} ${p.duration||'?'}分 ${p.detail||''}`).join('\n') || 'データなし';

  // Group walks by week for chart
  const weeklyWalk = groupByWeek(walks, 4);
  const weeklyMeal = groupByWeek(meals, 4);

  return `あなたは愛犬の健康アドバイザーです。以下のデータを分析して日本語で回答してください。

## 犬のプロフィール
名前: ${dog.name}
犬種: ${dog.breed||'不明'}
年齢: ${age}歳
体重: ${dog.weight||'不明'}kg
体質・特記: ${dog.constitution||'なし'}
好物: ${dog.favorites||'不明'}

## 直近の散歩記録（最新30件）
${walkSummary}

## 直近の食事記録（最新30件）
${mealSummary}

## 直近の遊び記録（最新20件）
${playSummary}

以下のJSON形式のみで回答してください（前後に余分なテキスト不要）:
{
  "title": "分析タイトル（例: れんの健康レポート 3月）",
  "summary": "全体的な健康状態と生活パターンの分析テキスト（200字程度）",
  "healthScore": 0から100の整数の健康スコア,
  "insights": ["気づき1", "気づき2", "気づき3"],
  "recommendations": ["アドバイス1", "アドバイス2", "アドバイス3"],
  "charts": {
    "weeklyWalk": { "labels": ${JSON.stringify(weeklyWalk.labels)}, "data": ${JSON.stringify(weeklyWalk.data)} },
    "weeklyMeal": { "labels": ${JSON.stringify(weeklyMeal.labels)}, "data": ${JSON.stringify(weeklyMeal.data)} },
    "activityBalance": { "walk": ${walks.length}, "meal": ${meals.length}, "play": ${plays.length} }
  }
}`;
}

function groupByWeek(acts, numWeeks) {
  const labels = [], data = [];
  for (let i = numWeeks-1; i >= 0; i--) {
    const end = new Date(); end.setDate(end.getDate() - i*7);
    const start = new Date(end); start.setDate(start.getDate() - 6);
    const label = `${start.getMonth()+1}/${start.getDate()}~`;
    const count = acts.filter(a => { const d = new Date(a.date); return d >= start && d <= end; }).length;
    labels.push(label); data.push(count);
  }
  return { labels, data };
}

function renderPostPreviews() {
  const existing = document.getElementById('post-prev').querySelectorAll('[id^="ep-"]');
  document.getElementById('post-prev').innerHTML = '';
  existing.forEach(el => document.getElementById('post-prev').appendChild(el));
  selectedFiles.forEach((f,i) => {

    const div = document.createElement('div'); div.className='pi';
    div.innerHTML = `<img src="${url}"><button class="pdel" onclick="delPostPhoto(${i})">✕</button>`;

async function submitPost() {
  if (!cfg.url) { toast('GAS URLが未設定です'); return; }
  const id = document.getElementById('f-id').value;
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('post-err').textContent = 'タイトルを入力してください'; return; }
  document.getElementById('post-err').textContent = '';
  const btn = document.getElementById('post-btn'); btn.disabled=true;
  setLoading(true, id ? '投稿を更新中…' : '写真をアップロード中…');
  try {
    const photos = [];
    for (const f of selectedFiles) photos.push(await compress(f, 900, 0.78));
    if (id) {
      // UPDATE
      await gasPost({ action:'updatePost', id, title, date:document.getElementById('f-date').value, genre:document.getElementById('f-genre').value, comment:document.getElementById('f-comment').value.trim(), author:document.getElementById('f-author').value.trim()||cfg.author||'匿名', newPhotos:photos, removePhotoIds:removedPhotoIndices });
      toast('更新しました！');
    } else {
      await gasPost({ action:'createPost', title, date:document.getElementById('f-date').value, genre:document.getElementById('f-genre').value, comment:document.getElementById('f-comment').value.trim(), author:document.getElementById('f-author').value.trim()||cfg.author||'匿名', photos });
      toast('投稿しました！');
    }
    closeOv('ov-post');
    selectedFiles=[]; removedPhotoIndices=[];
    setTimeout(loadData, 1200);
  } catch(e) { document.getElementById('post-err').textContent = 'エラー: ' + e.message; }
  finally { btn.disabled=false; btn.textContent = id?'更新する':'投稿する'; setLoading(false); }
}

  document.getElementById('dog-modal-ttl').textContent = '🐕 わんこを登録';
  document.getElementById('d-id').value = '';
  ['d-name','d-breed','d-birthday','d-weight','d-constitution','d-favorites','d-notes'].forEach(id => document.getElementById(id).value='');
  dogPhotoFile = null;
  const zone = document.getElementById('d-photo-zone');
  zone.innerHTML = `<span class="dpz-icon">📷</span><span class="dpz-txt">写真</span><input type="file" id="d-photo-input" accept="image/*" onchange="onDogPhoto(event)">`;
  document.getElementById('d-photo-del').style.display='none';
  openOv('ov-dog');
}

function onDogPhoto(e) {
  dogPhotoFile = e.target.files[0];
  if (!dogPhotoFile) return;
  const url = URL.createObjectURL(dogPhotoFile);
  const zone = document.getElementById('d-photo-zone');
  const old = zone.querySelector('input');
  zone.innerHTML = `<img src="${url}"><input type="file" id="d-photo-input" accept="image/*" onchange="onDogPhoto(event)">`;
  document.getElementById('d-photo-del').style.display='block';
}

function clearDogPhoto() {
  dogPhotoFile = null;
  const zone = document.getElementById('d-photo-zone');
  zone.innerHTML = `<span class="dpz-icon">📷</span><span class="dpz-txt">写真</span><input type="file" id="d-photo-input" accept="image/*" onchange="onDogPhoto(event)">`;
  document.getElementById('d-photo-del').style.display='none';
}

async function submitDog() {
  const name = document.getElementById('d-name').value.trim();
  if (!name) { document.getElementById('dog-err').textContent = '名前を入力してください'; return; }
  document.getElementById('dog-err').textContent = '';
  const btn = document.getElementById('dog-btn'); btn.disabled=true; btn.textContent='保存中…';
  setLoading(true, '保存中…');
  try {
    const id = document.getElementById('d-id').value;
    const payload = { action:'saveDog', id:id||undefined, name, breed:document.getElementById('d-breed').value.trim(), birthday:document.getElementById('d-birthday').value, weight:document.getElementById('d-weight').value, constitution:document.getElementById('d-constitution').value.trim(), favorites:document.getElementById('d-favorites').value.trim(), notes:document.getElementById('d-notes').value.trim() };
    if (dogPhotoFile) {
      const c = await compress(dogPhotoFile, 600, 0.88);
      payload.photoData = c.data; payload.photoMime = c.mimeType;
    }
    await gasPost(payload);
    closeOv('ov-dog'); toast('保存しました！');
    setTimeout(loadData, 800);
  } catch(e) { document.getElementById('dog-err').textContent = 'エラー: ' + e.message; }
  finally { btn.disabled=false; btn.textContent='保存する'; setLoading(false); }
}

async function confirmDeleteActivity(id) {
  if (!confirm('この記録を削除しますか？')) return;
  setLoading(true,'削除中…');
  try {
    await gasPost({ action:'deleteActivity', id });
    toast('削除しました');
    setTimeout(loadData, 600);
  } catch(e) { toast('エラー: '+e.message); }
  finally { setLoading(false); }
}

// ============================================================
//  ACTIVITY MODAL
// ============================================================
function openActivityPicker() {
  if (!appData.dogs.length) { openNewDog(); return; }
  // If only one dog, just open walk directly
  if (appData.dogs.length === 1) { openActivity(appData.dogs[0].id, 'walk'); return; }
  // Show picker - for simplicity use first dog, walk
  openActivity(appData.dogs[0].id, 'walk');
}

function openActivity(dogId, type) {
  const conf = ACT_CONF[type];
  document.getElementById('act-modal-ttl').textContent = conf.icon + ' ' + conf.label + 'を記録';
  document.getElementById('a-type').value = type;
  document.getElementById('a-date').value = today();
  document.getElementById('a-time').value = new Date().toTimeString().slice(0,5);
  document.getElementById('a-dur').value = '';
  document.getElementById('a-loc').value = '';
  document.getElementById('a-notes').value = '';
  document.getElementById('a-location-fg').style.display = conf.showLoc ? '' : 'none';

  const detailFg = document.getElementById('a-detail-fg');
  document.getElementById('a-detail-lbl').textContent = '📝 ' + conf.detailLabel;

  if (conf.useDropdown) {
    // 遊び内容: ドロップダウン + フリー入力切替
    const items = getPlayItems();
    detailFg.innerHTML = `
      <label id="a-detail-lbl">📝 ${conf.detailLabel}</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <select id="a-detail-sel" style="flex:1;padding:10px 12px;border:2px solid var(--crd);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--tx);background:var(--cr);-webkit-appearance:none;" onchange="onPlaySelChange()">
          <option value="">選択してください</option>
          ${items.map(it => `<option value="${esc(it.label)}">${it.icon} ${esc(it.label)}</option>`).join('')}
          <option value="__custom__">✏️ 直接入力…</option>
        </select>
      </div>
      <input type="text" id="a-detail" placeholder="遊び内容を入力" style="display:none;margin-top:8px;">`;
  } else {
    detailFg.innerHTML = `
      <label id="a-detail-lbl">📝 ${conf.detailLabel}</label>
      <input type="text" id="a-detail" placeholder="${conf.detailHint}">`;
  }

  const sel = document.getElementById('a-dog');
  if (dogId) sel.value = dogId;
  openOv('ov-act');
}

function onPlaySelChange() {
  const sel = document.getElementById('a-detail-sel');
  const inp = document.getElementById('a-detail');
  if (sel.value === '__custom__') {
    inp.style.display = '';
    inp.value = '';
    inp.focus();
  } else {
    inp.style.display = 'none';
    inp.value = sel.value;
  }
}

async function submitActivity() {
  const dogId = document.getElementById('a-dog').value;
  if (!dogId) { document.getElementById('act-err').textContent = 'わんこを選択してください'; return; }
  const type = document.getElementById('a-type').value;
  // get detail: dropdown or text
  let detail = '';
  const selEl = document.getElementById('a-detail-sel');
  const inpEl = document.getElementById('a-detail');
  if (selEl && selEl.style.display !== 'none') {
    detail = selEl.value === '__custom__' ? (inpEl?.value||'') : (selEl.value||'');
  } else {
    detail = inpEl?.value?.trim() || '';
  }
  document.getElementById('act-err').textContent = '';
  const btn = document.getElementById('act-btn'); btn.disabled=true; btn.textContent='記録中…';
  try {
    await gasPost({ action:'saveActivity', dogId, type, date:document.getElementById('a-date').value, startTime:document.getElementById('a-time').value, duration:document.getElementById('a-dur').value, location:document.getElementById('a-loc').value.trim(), detail, notes:document.getElementById('a-notes').value.trim() });
    closeOv('ov-act'); toast('記録しました！');
    setTimeout(loadData, 800);
  } catch(e) { document.getElementById('act-err').textContent = 'エラー: ' + e.message; }
  finally { btn.disabled=false; btn.textContent='記録する'; }
}

//  SETTINGS
// ============================================================
const PLAY_KEY = 'renapp_play_items';
function getPlayItems() {
  try { return JSON.parse(localStorage.getItem(PLAY_KEY) || 'null') || defaultPlayItems(); } catch(e) { return defaultPlayItems(); }
}
function savePlayItems(items) { localStorage.setItem(PLAY_KEY, JSON.stringify(items)); }
function defaultPlayItems() {
  return [
    { id:'p1', icon:'🎾', label:'ボール遊び' },
    { id:'p2', icon:'🪢', label:'ロープ引っ張り' },
    { id:'p3', icon:'🦴', label:'おもちゃ' },
    { id:'p4', icon:'🏃', label:'追いかけっこ' },
    { id:'p5', icon:'🌊', label:'水遊び' },
    { id:'p6', icon:'🤸', label:'アジリティ' },
  ];
}

function switchStab(tab) {
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('on'));
  document.getElementById('stab-' + tab).classList.add('on');
  document.getElementById('stab-app-body').style.display = tab === 'app' ? '' : 'none';
  document.getElementById('stab-core-body').style.display = tab === 'core' ? '' : 'none';
}

function openSettings() {
  document.getElementById('cfg-url').value = cfg.url||'';
  document.getElementById('cfg-author').value = cfg.author||'';
  document.getElementById('cfg-claude').value = '';
  switchStab('app');
  renderGenreEditor();
  renderPlayEditor();
  renderAssetEditor();
  openOv('ov-settings');
}

async function saveAppSettings() {
  cfg.author = document.getElementById('cfg-author').value.trim();
  saveCfg();
  toast('アプリ設定を保存しました ✓');
}

async function saveCoreSettings() {
  const url    = document.getElementById('cfg-url').value.trim();
  const claude = document.getElementById('cfg-claude').value.trim();
  const urlChanged = url !== cfg.url;
  cfg.url = url; saveCfg();
  if (claude && url) {
    try { await gasPost({ action:'setClaudeKey', key:claude }); toast('APIキーを保存しました ✓'); }
    catch(e) { toast('Keyの保存失敗: ' + e.message); return; }
  } else {
    toast('コア設定を保存しました ✓');
  }
  if (urlChanged && url) { closeOv('ov-settings'); loadData(); }
}

// ============================================================
//  PLAY ITEMS EDITOR
// ============================================================
function renderPlayEditor() {
  const el = document.getElementById('play-editor');
  if (!el) return;
  const items = getPlayItems();
  el.innerHTML = items.map(it => `
    <div class="genre-row" id="play-row-${it.id}">
      <input class="g-icon-pick" type="text" value="${esc(it.icon)}" id="pi-icon-${it.id}" maxlength="2" style="width:52px;text-align:center;font-size:18px;padding:7px 4px;">
      <input class="g-label-in" type="text" value="${esc(it.label)}" id="pi-lbl-${it.id}">
      <button class="g-add-btn" onclick="updatePlayItem('${it.id}')" style="white-space:nowrap">保存</button>
      <button class="g-del" onclick="removePlayItem('${it.id}')">削除</button>
    </div>`).join('');
}

function updatePlayItem(id) {
  const items = getPlayItems();
  const item = items.find(i => i.id === id); if (!item) return;
  item.label = document.getElementById('pi-lbl-'+id).value.trim() || item.label;
  item.icon  = document.getElementById('pi-icon-'+id).value.trim() || item.icon;
  savePlayItems(items); renderPlayEditor(); toast('更新しました');
}

function removePlayItem(id) {
  if (!confirm('この遊び内容を削除しますか？')) return;
  savePlayItems(getPlayItems().filter(i => i.id !== id));
  renderPlayEditor(); toast('削除しました');
}

function addPlayItem() {
  const label = document.getElementById('play-new-label').value.trim();
  const icon  = document.getElementById('play-new-icon').value.trim() || '🎾';
  if (!label) return;
  const items = getPlayItems();
  items.push({ id: 'p' + Date.now(), icon, label });
  savePlayItems(items);
  document.getElementById('play-new-label').value = '';
  document.getElementById('play-new-icon').value = '';
  renderPlayEditor(); toast('追加しました');
}

// ============================================================
//  GENRE EDITOR
// ============================================================
function renderGenreEditor() {
  const el = document.getElementById('genre-editor');
  el.innerHTML = appData.genres.map(g => `
    <div class="genre-row">
      <input class="g-icon-pick" type="text" value="${esc(g.icon)}" id="gi-${g.id}" maxlength="2" style="width:52px;text-align:center;font-size:18px;padding:7px 4px;">

async function addGenre() {

  if (!label) return;
  setLoading(true);

  catch(e) { toast('エラー: '+e.message); }
  finally { setLoading(false); }
}

async function removeGenre(id) {
  if (!confirm('このジャンルを削除しますか？')) return;
  setLoading(true);
  try { await gasPost({ action:'deleteGenre', id }); toast('削除しました'); setTimeout(loadData, 500); }
  catch(e) { toast('エラー: '+e.message); }

}

// ============================================================
//  ASSET EDITOR
// ============================================================
const ASSET_META = {
  logo:        { label:'サイトロゴ',     icon:'🐾' },
  site_bg:     { label:'サイト背景',     icon:'🌿' },
  header_bg:   { label:'ヘッダー背景',   icon:'🎨' },
  default_pet: { label:'ペットアイコン', icon:'🐶' },
};
function renderAssetEditor() {
  const el = document.getElementById('asset-editor');
  el.innerHTML = ['logo','site_bg','header_bg','default_pet'].map(key => {
    const meta = ASSET_META[key], asset = appData.assets[key]||{};
    const hasImg = !!asset.url;
    return `<div class="asset-row">
      <div class="asset-prev">${hasImg?`<img src="${asset.thumb||asset.url}">`:'<span>'+meta.icon+'</span>'}</div>
      <div class="ai-info"><div class="ai-label">${meta.label}</div></div>
      <div class="aact">
        <button class="a-up" onclick="startAssetUp('${key}')">変更</button>
        ${hasImg?`<button class="a-del" onclick="removeAsset('${key}')">削除</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function startAssetUp(key) { pendingAssetKey = key; const i=document.getElementById('asset-file-in'); i.value=''; i.click(); }
async function onAssetFile(e) {
  const file = e.target.files[0]; if (!file||!pendingAssetKey) return;
  setLoading(true,'画像をアップロード中…');
  try {
    const c = await compress(file, 800, 0.85);
    const r = await gasPost({ action:'updateAsset', key:pendingAssetKey, imageData:c.data, mimeType:c.mimeType, label:ASSET_META[pendingAssetKey]?.label });
    if (!appData.assets[pendingAssetKey]) appData.assets[pendingAssetKey]={key:pendingAssetKey};
    appData.assets[pendingAssetKey].url=r.url; appData.assets[pendingAssetKey].thumb=r.thumb;
    applyAssets(); renderAssetEditor(); toast('更新しました ✓');
  } catch(e) { toast('エラー: '+e.message); }
  finally { setLoading(false); pendingAssetKey=null; }
}
async function removeAsset(key) {
  if (!confirm('削除しますか？')) return;
  setLoading(true);
  try { await gasPost({ action:'deleteAsset', key }); if(appData.assets[key]){appData.assets[key].url='';appData.assets[key].thumb='';} applyAssets(); renderAssetEditor(); toast('削除しました'); }
  catch(e) { toast('エラー: '+e.message); }
  finally { setLoading(false); }
}

// ============================================================
//  OVERLAY HELPERS
// ============================================================
function openOv(id) { document.getElementById(id).classList.add('open'); }
function closeOv(id) { document.getElementById(id).classList.remove('open'); }

// ============================================================
//  GAS FETCH
// ============================================================
async function gasPost(body) {
  const r = await fetch(cfg.url, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(body), redirect:'follow' });
  const d = await r.json();
  if (!d.success) throw new Error(d.error||'GASエラー');
  return d;
}

// ============================================================
//  UTILS
// ============================================================
function compress(file, maxPx=900, q=0.78) {
  return new Promise(resolve => {
    const img = new Image(), burl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(burl);
      let w=img.width, h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(blob=>{const r=new FileReader();r.onload=()=>resolve({data:r.result.split(',')[1],mimeType:'image/jpeg',name:file.name.replace(/\.[^.]+$/,'')+'.jpg'});r.readAsDataURL(blob);},'image/jpeg',q);
    };
    img.src=burl;
  });
}
function fmtDate(s){if(!s)return'';const d=new Date(s);return isNaN(d)?s:`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200);}
function setLoading(v,msg='処理中…'){const el=document.getElementById('loading-ov');el.classList.toggle('show',v);if(msg)document.getElementById('loading-msg').textContent=msg;}
</script>
