<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>REN APP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:       #FEF3E2;
  --cream-dark:  #F0DEC0;
  --white:       #FFFCF5;
  --brown:       #7C4A2D;
  --brown-light: #A0673A;
  --amber:       #D4894A;
  --amber-light: #F4C99E;
  --text:        #3D2B1A;
  --text-mid:    #6B4E35;
  --text-light:  #9E7B5E;
  --shadow:      rgba(124,74,45,0.12);
  --r:           22px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Nunito',sans-serif;
  background:var(--cream);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ---- dynamic backgrounds applied via JS ---- */
body.has-site-bg {
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
body.has-site-bg::before {
  content:'';
  position:fixed;inset:0;
  background:rgba(254,243,226,0.82);
  pointer-events:none;z-index:0;
}
body > * { position:relative;z-index:1; }

/* ===================== HEADER ===================== */
.header{
  background:var(--white);
  border-bottom:1.5px solid var(--cream-dark);
  padding:0 16px;
  height:58px;
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 3px 18px var(--shadow);
  overflow:hidden;
}
/* header bg image overlay */
.header.has-header-bg {
  background-size:cover;
  background-position:center;
}
.header.has-header-bg::before {
  content:'';
  position:absolute;inset:0;
  background:rgba(255,248,240,0.88);
}
.header > * { position:relative;z-index:1; }

/* logo */
.logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Playfair Display',serif;
  font-size:20px;color:var(--brown);
  letter-spacing:-0.01em;
  text-decoration:none;
}
.logo-img{
  width:36px;height:36px;border-radius:50%;
  object-fit:cover;
  border:2px solid var(--amber-light);
  background:var(--cream-dark);
  display:block;
}
.logo-paw{
  font-size:26px;display:inline-block;
  animation:pawWiggle 4s ease-in-out infinite;
}
@keyframes pawWiggle{
  0%,100%{transform:rotate(-8deg) scale(1);}
  50%{transform:rotate(8deg) scale(1.05);}
}

.header-right{display:flex;gap:4px;}
.icon-btn{
  background:none;border:none;cursor:pointer;
  padding:8px;border-radius:50%;font-size:20px;
  color:var(--brown);transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{background:var(--cream);transform:scale(1.12);}

/* ===================== FEED ===================== */
.feed{max-width:540px;margin:0 auto;padding:20px 14px 110px;}

.empty{text-align:center;padding:70px 20px;color:var(--text-light);}
.empty-icon{font-size:76px;display:block;margin-bottom:18px;
  animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.empty h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--brown);margin-bottom:8px;}
.empty p{font-size:14px;line-height:1.7;}

.loading{text-align:center;padding:60px 20px;color:var(--text-light);font-size:14px;}
.loading-spin{font-size:40px;display:block;margin-bottom:14px;animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===================== CARD ===================== */
.card{
  background:var(--white);border-radius:var(--r);
  margin-bottom:22px;
  box-shadow:0 4px 26px var(--shadow),0 1px 4px rgba(0,0,0,.04);
  overflow:hidden;
  animation:cardIn .4s cubic-bezier(.22,1,.36,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.card-head{padding:12px 15px;display:flex;align-items:center;gap:11px;}
.avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--amber-light),var(--brown));
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:18px;font-weight:700;
  color:var(--white);text-transform:uppercase;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;}
.author-info{flex:1;min-width:0;}
.author-name{font-weight:700;font-size:15px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.post-date{font-size:12px;color:var(--text-light);margin-top:2px;}
.genre-tag{
  flex-shrink:0;padding:4px 11px;border-radius:20px;
  font-size:12px;font-weight:700;
  background:var(--cream-dark);color:var(--brown);white-space:nowrap;
}

/* carousel */
.carousel{position:relative;background:var(--cream-dark);overflow:hidden;}
.c-track{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);}
.c-track img{min-width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.c-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.88);border:none;border-radius:50%;
  width:38px;height:38px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--brown);
  box-shadow:0 2px 10px rgba(0,0,0,.18);transition:all .2s;z-index:2;
}
.c-btn:hover{background:white;transform:translateY(-50%) scale(1.08);}
.c-btn.prev{left:10px;} .c-btn.next{right:10px;}
.c-btn[hidden]{display:none;}
.c-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;z-index:2;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.55);transition:all .25s;}
.dot.on{background:white;transform:scale(1.4);}
.no-photo{background:linear-gradient(135deg,var(--amber-light),var(--cream-dark));
  height:180px;display:flex;align-items:center;justify-content:center;font-size:64px;}

.card-body{padding:14px 16px 18px;}
.card-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;
  color:var(--text);margin-bottom:8px;line-height:1.4;}
.card-comment{font-size:14px;color:var(--text-mid);line-height:1.75;
  white-space:pre-wrap;word-break:break-word;}

/* ===================== FAB ===================== */
.fab{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  width:62px;height:62px;border-radius:50%;
  background:linear-gradient(145deg,var(--amber),var(--brown));
  border:none;cursor:pointer;z-index:200;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;color:white;
  box-shadow:0 6px 28px rgba(124,74,45,.44);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.fab:hover{transform:translateX(-50%) scale(1.12);}
.fab:active{transform:translateX(-50%) scale(.94);}

/* ===================== MODAL BASE ===================== */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(40,22,10,.60);z-index:300;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(5px);
}
.overlay.open{display:flex;animation:fadeOv .2s;}
@keyframes fadeOv{from{opacity:0;}to{opacity:1;}}

.modal{
  background:var(--white);border-radius:28px 28px 0 0;
  width:100%;max-width:560px;max-height:94vh;
  overflow-y:auto;overscroll-behavior:contain;
  animation:slideUp .32s cubic-bezier(.32,1.25,.6,1);
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}

.modal-grip{width:42px;height:4px;background:var(--cream-dark);
  border-radius:2px;margin:12px auto 0;}
.modal-head{
  padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1.5px solid var(--cream-dark);
}
.modal-ttl{font-family:'Playfair Display',serif;font-size:19px;color:var(--brown);}
.close-btn{
  background:var(--cream);border:none;border-radius:50%;
  width:36px;height:36px;cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-light);transition:all .2s;
}
.close-btn:hover{background:var(--cream-dark);color:var(--text);}

.modal-body{padding:20px 16px 28px;}

/* ---- form ---- */
.fg{margin-bottom:18px;}
label{display:block;font-size:12px;font-weight:700;color:var(--brown-light);
  margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
input,select,textarea{
  width:100%;padding:12px 14px;
  border:2px solid var(--cream-dark);border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:15px;
  color:var(--text);background:var(--cream);
  outline:none;transition:border-color .2s,background .2s;
  -webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--amber);background:var(--white);}
textarea{resize:none;height:100px;line-height:1.7;}

.upload-zone{
  border:2px dashed var(--amber);border-radius:14px;
  padding:20px;text-align:center;cursor:pointer;
  background:var(--cream);transition:all .2s;
}
.upload-zone:hover{background:var(--amber-light);border-color:var(--brown-light);}
.upload-zone .u-icon{font-size:32px;margin-bottom:5px;}
.upload-zone p{font-size:13px;color:var(--text-light);line-height:1.6;}
.upload-zone input{display:none;}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.prev-item{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;}
.prev-item img{width:100%;height:100%;object-fit:cover;}
.prev-del{
  position:absolute;top:4px;right:4px;
  background:rgba(0,0,0,.52);color:white;
  border:none;border-radius:50%;width:22px;height:22px;
  cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
}

.btn-post{
  width:100%;padding:15px;margin-top:8px;
  background:linear-gradient(135deg,var(--amber),var(--brown));
  color:white;border:none;border-radius:14px;
  font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-post:hover:not(:disabled){opacity:.92;transform:translateY(-1px);}
.btn-post:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.err-msg{font-size:13px;color:#c0392b;margin-top:8px;min-height:18px;}

/* ===================== SETTINGS: ASSETS ===================== */
.assets-section{margin-bottom:28px;}
.assets-section h3{
  font-family:'Playfair Display',serif;font-size:16px;
  color:var(--brown);margin-bottom:14px;
  padding-bottom:8px;border-bottom:1.5px solid var(--cream-dark);
}
.asset-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--cream-dark);
}
.asset-row:last-child{border-bottom:none;}
.asset-preview{
  width:52px;height:52px;border-radius:10px;
  object-fit:cover;background:var(--cream-dark);
  flex-shrink:0;border:1.5px solid var(--cream-dark);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;overflow:hidden;
}
.asset-preview img{width:100%;height:100%;object-fit:cover;}
.asset-info{flex:1;min-width:0;}
.asset-label{font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px;}
.asset-sub{font-size:11px;color:var(--text-light);}
.asset-actions{display:flex;gap:6px;}
.a-btn{
  padding:6px 12px;border:none;border-radius:8px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.a-btn.up{background:var(--amber-light);color:var(--brown);}
.a-btn.up:hover{background:var(--amber);color:white;}
.a-btn.del{background:#fce8e8;color:#c0392b;}
.a-btn.del:hover{background:#f1c0c0;}
.a-btn[hidden]{display:none;}

.sect-divider{height:1px;background:var(--cream-dark);margin:20px 0;}

/* ===================== TOAST ===================== */
.toast{
  position:fixed;top:72px;left:50%;
  transform:translateX(-50%) translateY(-14px);
  background:var(--text);color:var(--white);
  padding:11px 22px;border-radius:24px;
  font-size:14px;font-weight:600;z-index:999;
  opacity:0;pointer-events:none;white-space:nowrap;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===================== SETUP GUIDE ===================== */
.setup-guide{
  background:var(--white);border-radius:var(--r);
  padding:22px 20px 24px;margin-bottom:20px;
  box-shadow:0 4px 20px var(--shadow);
  border-left:4px solid var(--amber);
}
.setup-guide h2{
  font-family:'Playfair Display',serif;
  font-size:17px;color:var(--brown);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.step{display:flex;gap:12px;margin-bottom:14px;}
.step:last-child{margin-bottom:0;}
.step-num{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--amber),var(--brown));
  color:white;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.step-body{flex:1;min-width:0;}
.step-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;}
.step-desc{font-size:12px;color:var(--text-light);line-height:1.7;}
.step-code{
  display:inline-block;margin-top:5px;
  background:var(--cream-dark);color:var(--brown);
  font-size:11px;font-family:monospace;
  padding:3px 8px;border-radius:6px;word-break:break-all;
}
.btn-setup{
  width:100%;margin-top:16px;padding:13px;
  background:linear-gradient(135deg,var(--amber),var(--brown));
  color:white;border:none;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-setup:hover{opacity:.9;}

/* ===================== UPLOADING OVERLAY ===================== */
#uploading{
  display:none;position:fixed;inset:0;
  background:rgba(40,22,10,.55);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:white;font-size:16px;font-weight:600;
}
#uploading.show{display:flex;}
#uploading .spin{font-size:44px;animation:spin 1s linear infinite;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header" id="main-header">
  <a class="logo" href="#" onclick="return false">
    <span class="logo-paw" id="logo-default">🐾</span>
    <!-- logo img inserted by JS -->
    <span id="logo-text" style="font-size:17px;font-weight:700;letter-spacing:.06em;">REN APP</span>
  </a>
  <div class="header-right">
    <button class="icon-btn" onclick="loadData()" title="更新">🔄</button>
    <button class="icon-btn" onclick="openSettings()" title="設定">⚙️</button>
  </div>
</header>

<!-- FEED -->
<main class="feed" id="feed">
  <div class="loading"><span class="loading-spin">🐾</span>読み込み中…</div>
</main>

<!-- FAB -->
<button class="fab" onclick="openPost()" title="投稿する">＋</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- UPLOADING -->
<div id="uploading"><span class="spin">🐾</span>アップロード中…</div>

<!-- ==================== POST MODAL ==================== -->
<div class="overlay" id="post-overlay">
  <div class="modal">
    <div class="modal-grip"></div>
    <div class="modal-head">
      <span class="modal-ttl">🐶 思い出を投稿</span>
      <button class="close-btn" onclick="closePost()">✕</button>
    </div>
    <div class="modal-body">

      <div class="fg">
        <label>📷 写真（最大9枚）</label>
        <div class="upload-zone" onclick="document.getElementById('f-photos').click()">
          <div class="u-icon">📸</div>
          <p>タップして写真を選択<br>複数枚同時にOK</p>
          <input type="file" id="f-photos" accept="image/*" multiple onchange="onPhotoChange(event)">
        </div>
        <div class="preview-grid" id="preview-grid"></div>
      </div>

      <div class="fg">
        <label>✏️ タイトル <span style="color:#c0392b">*</span></label>
        <input type="text" id="f-title" placeholder="例：公園でお散歩♪" maxlength="60">
      </div>
      <div class="fg">
        <label>📅 日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="fg">
        <label>🏷️ ジャンル</label>
        <select id="f-genre">
          <option value="おさんぽ">🦮 おさんぽ</option>
          <option value="ごはん">🍖 ごはん</option>
          <option value="おやすみ">😴 おやすみ</option>
          <option value="おでかけ">🚗 おでかけ</option>
          <option value="病院">💊 病院</option>
          <option value="お誕生日">🎂 お誕生日</option>
          <option value="トリミング">✂️ トリミング</option>
          <option value="その他">🌟 その他</option>
        </select>
      </div>
      <div class="fg">
        <label>💬 コメント</label>
        <textarea id="f-comment" placeholder="今日の思い出を書いてね…"></textarea>
      </div>
      <div class="fg">
        <label>👤 投稿者</label>
        <input type="text" id="f-author" placeholder="例：ゆず ママ">
      </div>
      <div class="err-msg" id="post-err"></div>
      <button class="btn-post" id="post-btn" onclick="submitPost()">投稿する</button>
    </div>
  </div>
</div>

<!-- ==================== SETTINGS MODAL ==================== -->
<div class="overlay" id="cfg-overlay">
  <div class="modal">
    <div class="modal-grip"></div>
    <div class="modal-head">
      <span class="modal-ttl">⚙️ REN APP 設定</span>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">

      <!-- GAS URL -->
      <div class="fg">
        <label>🔗 GAS ウェブアプリ URL</label>
        <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/…/exec">
        <p style="font-size:12px;color:var(--text-light);margin-top:5px;line-height:1.8;">
          「デプロイ → 新しいデプロイ」で取得したURL<br>
          種類：<b>ウェブアプリ</b>　アクセス：<b>全員</b>
        </p>
      </div>
      <div class="fg">
        <label>👤 デフォルト投稿者名</label>
        <input type="text" id="cfg-author" placeholder="例：ゆず ママ">
      </div>
      <button class="btn-post" onclick="saveSettings()">保存する ✓</button>

      <div class="sect-divider"></div>

      <!-- ===== ASSETS MANAGEMENT ===== -->
      <div class="assets-section">
        <h3>🖼️ サイト画像の管理</h3>
        <p style="font-size:12px;color:var(--text-light);margin-bottom:14px;line-height:1.7;">
          画像は Google Drive に保存されます。<br>
          変更はページリロード後に反映されます。
        </p>
        <div id="asset-list">
          <!-- JS で生成 -->
          <p style="color:var(--text-light);font-size:14px;">
            GAS URL を設定してから開き直してください
          </p>
        </div>
      </div>

      <!-- hidden file input for asset upload -->
      <input type="file" id="asset-file-input" accept="image/*" style="display:none"
             onchange="onAssetFileSelected(event)">

    </div>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const CFG_KEY  = 'wanko_cfg_v2';
let cfg = {};
try { cfg = JSON.parse(localStorage.getItem(CFG_KEY) || '{}'); } catch(e) {}
function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }

// ===================== STATE =====================
let selectedFiles  = [];   // post photos
let currentAssets  = {};   // { key: {url,thumb,label,...} }
let pendingAssetKey= null;  // asset key being uploaded

// ===================== INIT =====================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = today();

  document.getElementById('post-overlay').addEventListener('click', e => {
    if (e.target.id === 'post-overlay') closePost();
  });
  document.getElementById('cfg-overlay').addEventListener('click', e => {
    if (e.target.id === 'cfg-overlay') closeSettings();
  });

  if (!cfg.url) { setTimeout(openSettings, 600); }
  else { loadData(); }
});

function today() { return new Date().toISOString().split('T')[0]; }

// ===================== LOAD DATA =====================
async function loadData() {
  if (!cfg.url) return renderNoConfig();

  document.getElementById('feed').innerHTML =
    '<div class="loading"><span class="loading-spin">🐾</span>読み込み中…</div>';

  try {
    const res  = await fetch(cfg.url + '?t=' + Date.now());
    const data = await res.json();

    currentAssets = data.assets || {};
    applyAssets(currentAssets);

    renderFeed(data.posts || []);
    renderAssetList(currentAssets);
  } catch(e) {
    document.getElementById('feed').innerHTML =
      `<div class="empty"><span class="empty-icon">😅</span>
       <h2>読み込みに失敗しました</h2>
       <p>GAS URL を確認してください<br><small style="opacity:.7">${e.message}</small></p></div>`;
  }
}

// ===================== APPLY ASSETS TO UI =====================
function applyAssets(assets) {
  // --- Logo ---
  const logo = assets.logo;
  const logoContainer = document.querySelector('.logo');
  if (logo && logo.url) {
    let img = document.getElementById('logo-img');
    if (!img) {
      img = document.createElement('img');
      img.id = 'logo-img';
      img.className = 'logo-img';
      img.alt = 'ロゴ';
    }
    img.src = logo.thumb || logo.url;
    document.getElementById('logo-default').replaceWith(img);
  } else {
    // restore paw if deleted
    let paw = document.getElementById('logo-default');
    if (!paw) {
      paw = document.createElement('span');
      paw.id = 'logo-default';
      paw.className = 'logo-paw';
      paw.textContent = '🐾';
      const img = document.getElementById('logo-img');
      if (img) img.replaceWith(paw);
      else logoContainer.prepend(paw);
    }
  }

  // --- Site background ---
  const siteBg = assets.site_bg;
  if (siteBg && siteBg.url) {
    document.body.style.backgroundImage = `url("${siteBg.url}")`;
    document.body.classList.add('has-site-bg');
  } else {
    document.body.style.backgroundImage = '';
    document.body.classList.remove('has-site-bg');
  }

  // --- Header background ---
  const headerBg = assets.header_bg;
  const header = document.getElementById('main-header');
  if (headerBg && headerBg.url) {
    header.style.backgroundImage = `url("${headerBg.url}")`;
    header.classList.add('has-header-bg');
  } else {
    header.style.backgroundImage = '';
    header.classList.remove('has-header-bg');
  }
}

function renderFeed(posts) {
  const feed = document.getElementById('feed');
  if (!posts.length) {
    feed.innerHTML = `<div class="empty">
      <span class="empty-icon">🐶</span>
      <h2>まだ投稿がありません</h2>
      <p>＋ボタンから最初の思い出を投稿しよう！</p></div>`;
    return;
  }
  feed.innerHTML = posts.map((p, i) => buildCard(p, i)).join('');
}

function buildCard(p, i) {
  const photos   = Array.isArray(p.photos) ? p.photos : [];
  const icon     = GENRE_ICON[p.genre] || '🌟';
  const initial  = p.author ? p.author[0].toUpperCase() : '?';
  const cid      = 'c' + i;

  // default pet icon from assets
  const petAsset = currentAssets.default_pet;
  const avatarHtml = petAsset && petAsset.url
    ? `<div class="avatar"><img src="${petAsset.thumb||petAsset.url}" alt="pet"></div>`
    : `<div class="avatar">${initial}</div>`;

  let photoHtml;
  if (!photos.length) {
    photoHtml = `<div class="no-photo">🐾</div>`;
  } else {
    const slides = photos.map(ph =>
      `<img src="${ph.thumb||ph.url||ph}" alt="思い出" loading="lazy"
            onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23F0DEC0%22 width=%22100%25%22 height=%22100%25%22/%3E%3Ctext x=%2250%25%22 y=%2253%25%22 text-anchor=%22middle%22 font-size=%2240%22%3E🐾%3C/text%3E%3C/svg%3E'">`
    ).join('');
    const multi = photos.length > 1;
    const dots  = multi ? photos.map((_,j) =>
      `<div class="dot ${j===0?'on':''}"></div>`).join('') : '';
    photoHtml = `
      <div class="carousel" id="${cid}">
        <div class="c-track">${slides}</div>
        ${multi ? `
          <button class="c-btn prev" hidden onclick="moveCar('${cid}',-1)">‹</button>
          <button class="c-btn next" onclick="moveCar('${cid}',1)">›</button>
          <div class="c-dots">${dots}</div>` : ''}
      </div>`;
  }

  return `
  <div class="card">
    <div class="card-head">
      ${avatarHtml}
      <div class="author-info">
        <div class="author-name">${esc(p.author||'匿名')}</div>
        <div class="post-date">${fmtDate(p.date)}</div>
      </div>
      <div class="genre-tag">${icon} ${esc(p.genre||'その他')}</div>
    </div>
    ${photoHtml}
    <div class="card-body">
      ${p.title   ? `<div class="card-title">${esc(p.title)}</div>`   : ''}
      ${p.comment ? `<div class="card-comment">${esc(p.comment)}</div>` : ''}
    </div>
  </div>`;
}

// ===================== CAROUSEL =====================
const carState = {};
function moveCar(id, dir) {
  const el = document.getElementById(id);
  if (!el) return;
  const slides = el.querySelectorAll('.c-track img');
  const n = slides.length;
  if (!carState[id]) carState[id] = 0;
  carState[id] = Math.max(0, Math.min(n-1, carState[id] + dir));
  const cur = carState[id];
  el.querySelector('.c-track').style.transform = `translateX(-${cur*100}%)`;
  el.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===cur));
  const pb = el.querySelector('.prev'); if(pb) pb.hidden = cur===0;
  const nb = el.querySelector('.next'); if(nb) nb.hidden = cur===n-1;
}

// ===================== ASSET LIST (settings) =====================
const ASSET_META = {
  logo:        { label:'サイトロゴ',     icon:'🐾', desc:'ヘッダーに表示されるロゴ画像' },
  site_bg:     { label:'サイト背景',     icon:'🌿', desc:'全体の背景画像' },
  header_bg:   { label:'ヘッダー背景',   icon:'🎨', desc:'ヘッダーバーの背景画像' },
  default_pet: { label:'ペットアイコン', icon:'🐶', desc:'投稿カードのアバター画像' },
};

function renderAssetList(assets) {
  const el = document.getElementById('asset-list');
  if (!el) return;

  const keys = ['logo','site_bg','header_bg','default_pet'];
  el.innerHTML = keys.map(key => {
    const meta  = ASSET_META[key] || { label: key, icon:'📁', desc:'' };
    const asset = assets[key] || {};
    const hasImg = !!(asset.url || asset.thumb);

    const thumbHtml = hasImg
      ? `<div class="asset-preview"><img src="${asset.thumb||asset.url}" alt="${meta.label}"></div>`
      : `<div class="asset-preview">${meta.icon}</div>`;

    return `
    <div class="asset-row" id="arow-${key}">
      ${thumbHtml}
      <div class="asset-info">
        <div class="asset-label">${meta.label}</div>
        <div class="asset-sub">${meta.desc}</div>
      </div>
      <div class="asset-actions">
        <button class="a-btn up" onclick="startAssetUpload('${key}')">変更</button>
        <button class="a-btn del" onclick="removeAsset('${key}')" ${hasImg?'':'hidden'}>削除</button>
      </div>
    </div>`;
  }).join('');
}

// ===================== ASSET UPLOAD =====================
function startAssetUpload(key) {
  pendingAssetKey = key;
  const input = document.getElementById('asset-file-input');
  input.value = '';
  input.click();
}

async function onAssetFileSelected(e) {
  const file = e.target.files[0];
  if (!file || !pendingAssetKey) return;
  if (!cfg.url) { toast('先に GAS URL を設定してください'); return; }

  showUploading(true);

  try {
    const compressed = await compress(file, 800, 0.85);
    const body = JSON.stringify({
      action:    'updateAsset',
      key:       pendingAssetKey,
      imageData: compressed.data,
      mimeType:  compressed.mimeType,
      label:     ASSET_META[pendingAssetKey]?.label || pendingAssetKey
    });

    const res  = await fetch(cfg.url, { method:'POST', headers:{'Content-Type':'text/plain'}, body, redirect:'follow' });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '不明なエラー');

    // update local state
    if (!currentAssets[pendingAssetKey]) currentAssets[pendingAssetKey] = { key: pendingAssetKey };
    currentAssets[pendingAssetKey].url   = data.url;
    currentAssets[pendingAssetKey].thumb = data.thumb;

    applyAssets(currentAssets);
    renderAssetList(currentAssets);
    toast(`${ASSET_META[pendingAssetKey]?.label || pendingAssetKey} を更新しました ✓`);
  } catch(err) {
    toast('エラー: ' + err.message);
  } finally {
    showUploading(false);
    pendingAssetKey = null;
  }
}

async function removeAsset(key) {
  if (!cfg.url) { toast('先に GAS URL を設定してください'); return; }
  if (!confirm(`「${ASSET_META[key]?.label || key}」を削除しますか？`)) return;

  showUploading(true);
  try {
    const body = JSON.stringify({ action:'deleteAsset', key });
    const res  = await fetch(cfg.url, { method:'POST', headers:{'Content-Type':'text/plain'}, body, redirect:'follow' });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '不明なエラー');

    if (currentAssets[key]) { currentAssets[key].url = ''; currentAssets[key].thumb = ''; }
    applyAssets(currentAssets);
    renderAssetList(currentAssets);
    toast(`削除しました`);
  } catch(err) {
    toast('エラー: ' + err.message);
  } finally {
    showUploading(false);
  }
}

// ===================== POST SUBMIT =====================
function onPhotoChange(e) {
  Array.from(e.target.files).forEach(f => { if (selectedFiles.length < 9) selectedFiles.push(f); });
  renderPreviews();
  e.target.value = '';
}
function renderPreviews() {
  document.getElementById('preview-grid').innerHTML = selectedFiles.map((f,i) => {
    const url = URL.createObjectURL(f);
    return `<div class="prev-item"><img src="${url}">
      <button class="prev-del" onclick="delPhoto(${i})">✕</button></div>`;
  }).join('');
}
function delPhoto(i) { selectedFiles.splice(i,1); renderPreviews(); }

async function submitPost() {
  if (!cfg.url) { toast('先に設定で GAS URL を登録してください'); return; }
  const title   = document.getElementById('f-title').value.trim();
  const date    = document.getElementById('f-date').value;
  const genre   = document.getElementById('f-genre').value;
  const comment = document.getElementById('f-comment').value.trim();
  const author  = document.getElementById('f-author').value.trim() || cfg.author || '匿名';

  document.getElementById('post-err').textContent = '';
  if (!title) { document.getElementById('post-err').textContent = 'タイトルを入力してください'; return; }

  const btn = document.getElementById('post-btn');
  btn.disabled = true; btn.textContent = '投稿中… 🐾';
  showUploading(true);

  try {
    const photos = [];
    for (const f of selectedFiles) photos.push(await compress(f, 900, 0.78));
    const body = JSON.stringify({ action:'createPost', title, date, genre, comment, author, photos });
    const res  = await fetch(cfg.url, { method:'POST', headers:{'Content-Type':'text/plain'}, body, redirect:'follow' });
    const result = await res.json();
    if (!result.success) throw new Error(result.error || '不明なエラー');

    closePost(); toast('投稿しました！'); resetForm();
    setTimeout(loadData, 1400);
  } catch(e) {
    document.getElementById('post-err').textContent = 'エラー: ' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = '投稿する 🐾';
    showUploading(false);
  }
}

function resetForm() {
  ['f-title','f-comment'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = today();
  document.getElementById('f-genre').selectedIndex = 0;
  document.getElementById('f-author').value = cfg.author || '';
  selectedFiles = [];
  document.getElementById('preview-grid').innerHTML = '';
}

// ===================== SETTINGS =====================
function openSettings() {
  document.getElementById('cfg-url').value    = cfg.url    || '';
  document.getElementById('cfg-author').value = cfg.author || '';
  if (Object.keys(currentAssets).length) renderAssetList(currentAssets);
  document.getElementById('cfg-overlay').classList.add('open');
}
function closeSettings() { document.getElementById('cfg-overlay').classList.remove('open'); }
function saveSettings() {
  cfg.url    = document.getElementById('cfg-url').value.trim();
  cfg.author = document.getElementById('cfg-author').value.trim();
  saveCfg();
  closeSettings();
  toast('設定を保存しました ✓');
  if (cfg.url) loadData();
}

function openPost() {
  if (cfg.author) document.getElementById('f-author').value = cfg.author;
  document.getElementById('post-overlay').classList.add('open');
}
function closePost() { document.getElementById('post-overlay').classList.remove('open'); }

// ===================== UTILS =====================
function showUploading(v) {
  document.getElementById('uploading').classList.toggle('show', v);
}
function compress(file, maxPx=900, quality=0.78) {
  return new Promise(resolve => {
    const img = new Image();
    const bUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(bUrl);
      let w=img.width, h=img.height;
      if(w>maxPx||h>maxPx){
        if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
        else{w=Math.round(w*maxPx/h);h=maxPx;}
      }
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(blob=>{
        const r=new FileReader();
        r.onload=()=>resolve({data:r.result.split(',')[1],mimeType:'image/jpeg',name:file.name.replace(/\.[^.]+$/,'')+'.jpg'});
        r.readAsDataURL(blob);
      },'image/jpeg',quality);
    };
    img.src=bUrl;
  });
}
function fmtDate(s) {
  if(!s) return '';
  const d=new Date(s);
  return isNaN(d)?s:`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3200);
}
